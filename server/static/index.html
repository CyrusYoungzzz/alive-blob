<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alive Blob</title>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <!-- 视口裁切 -->
  <div id="viewport">
    <div id="slider">

      <!-- Page 1: 角色展示 -->
      <div class="slide" id="slide-char">
        <div class="slide-inner">

          <div class="top-bar">
            <div>
              <div class="title" id="char-name-display">Cube</div>
              <div class="subtitle" id="char-desc">Alive Blob</div>
            </div>
            <div id="conn-dot"></div>
          </div>

          <div class="avatar-wrap">
            <div class="avatar-glow" id="avatar-glow"></div>
            <iframe id="eye-preview" src="/eye-app/" frameborder="0" scrolling="no" allowtransparency="true"></iframe>
          </div>

          <div class="emotion-name" id="emotion-name">calm</div>

          <div class="chips-wrap">
            <div class="chips" id="chips"></div>
          </div>

          <div class="dots">
            <span class="dot on"></span><span class="dot"></span>
          </div>
        </div>
      </div>

      <!-- Page 2: 添加角色 -->
      <div class="slide" id="slide-add">
        <div class="slide-inner scroll-y">

          <div class="top-bar">
            <button class="back-btn" id="btn-back">&larr;</button>
            <div class="title small">添加角色</div>
          </div>

          <!-- Step 1: Camera -->
          <div id="cam-step" class="cam-section">
            <div class="cam-box">
              <video id="cam-video" autoplay playsinline muted></video>
              <canvas id="cam-overlay"></canvas>
              <div class="cam-hint" id="cam-hint">加载人脸检测模型...</div>
            </div>
            <div class="cam-controls">
              <button class="btn-shutter" id="btn-shutter" disabled>
                <span class="shutter-ring"></span>
              </button>
              <div class="cam-tip">按 <kbd>Space</kbd> 或点击快门拍摄</div>
            </div>
          </div>

          <!-- Step 2: Face selection -->
          <div id="face-step" class="face-section" style="display:none">
            <div class="face-header">
              <span>检测到 <b id="face-count">0</b> 张人脸，勾选要添加的：</span>
              <button class="btn-small" id="btn-retake">重拍</button>
            </div>
            <div class="face-grid" id="face-grid"></div>
            <button class="btn-primary" id="btn-add-faces" disabled>添加选中的人脸</button>
            <div class="status-text" id="face-status"></div>
          </div>

          <div class="list-section">
            <div class="list-title">已有角色</div>
            <div id="char-list"></div>
          </div>

          <div class="dots">
            <span class="dot"></span><span class="dot on"></span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
